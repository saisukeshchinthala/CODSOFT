<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch | Movie Recommendations</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">🎬</span> CineMatch
            </div>
            <p>Discover your next favorite movie based on your preferences.</p>
        </header>

        <main>
            <section class="preferences-section panel">
                <h2>1. Tell us what you like</h2>
                
                <div class="input-group">
                    <label for="searchInput">🔍 Search Movies (Optional)</label>
                    <input type="text" id="searchInput" placeholder="Search by title, genre, or tag...">
                </div>

                <div class="input-group">
                    <label>🎭 Select Favorite Genres</label>
                    <div class="pill-group" id="genreContainer">
                        <!-- Genres will be dynamically injected here -->
                    </div>
                </div>

                <div class="input-group">
                    <label for="ratingFilter">⭐ Minimum Rating: <span id="ratingValue">7.0</span></label>
                    <input type="range" id="ratingFilter" min="1" max="10" step="0.1" value="7.0">
                </div>

                <button id="recommendBtn" class="primary-btn">
                    Get Recommendations ✨
                </button>
            </section>

            <section class="results-section">
                <div class="results-header">
                    <h2>Your Recommendations</h2>
                    <span id="resultCount" class="badge hidden">0 found</span>
                </div>
                
                <div id="loadingIndicator" class="hidden">
                    <div class="spinner"></div>
                    <p>Finding the best matches...</p>
                </div>

                <div id="recommendationsContainer" class="grid-container">
                    <!-- Movie cards will be dynamically injected here -->
                    <div class="empty-state">
                        <div class="icon">🍿</div>
                        <p>Select your preferences and click "Get Recommendations" to see movies tailored to your taste.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
